<body>
  <main class="landing" data-click-area>
    <header class="topbar">
      <div class="brand">
        <img class="brand__icon" src="assets/safari.svg" alt="">
        <span class="brand__name" data-i18n="brand"></span>
      </div>
      <time class="current-date" data-current-date></time>
    </header>

    <section class="alert">
      <h1 class="alert__title">
        <span class="alert__danger" data-i18n="heroDanger"></span>
        <span data-i18n="heroTitle"></span>
      </h1>
      <p class="alert__copy" data-i18n="heroCopy"></p>

      <div class="divider"></div>
      <div class="timer" data-countdown></div>
      <div class="divider"></div>

      <h2 class="steps__title" data-i18n="stepsTitle"></h2>
      <ol class="steps">
        <li class="steps__item">
          <span class="steps__number">1</span>
          <span data-i18n="stepOne"></span>
        </li>
        <li class="steps__item">
          <span class="steps__number">2</span>
          <span data-i18n="stepTwo"></span>
        </li>
      </ol>
    </section>

    <a class="cta" href="{offer}" data-offer-link data-i18n="cta"></a>
  </main>

  <script src="app.js"></script>
</body>
</html>
