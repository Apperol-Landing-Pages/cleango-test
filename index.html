    <main class="app" id="app">
      <header class="top-header" aria-label="Brand logos">
        <div class="brand-strip">
          <img class="brand-logo brand-logo-openai" src="./assets/openai-logo.svg" alt="" />
          <span class="brand-divider" aria-hidden="true"></span>
          <img class="brand-logo brand-logo-gemini" src="./assets/gemini-logo.svg" alt="" />
        </div>
      </header>

      <section class="phone-shell">
        <section class="alert-card">
          <img class="alert-icon pulse-icon" src="./assets/alert-icon.svg" alt="" />

          <div class="alert-copy">
            <p class="alert-title" data-i18n="alertTitle"></p>
            <p class="alert-text" data-i18n="alertBody"></p>
          </div>

          <button class="cta-button" id="cta-button" type="button" data-i18n="buttonLabel"></button>
        </section>

        <section class="countdown-card" aria-live="polite">
          <div class="countdown-message">
            <img class="warning-icon" src="./assets/warning-icon.svg" alt="" />
            <p class="countdown-text" data-i18n="countdownLabel"></p>
          </div>

          <span class="countdown-divider" aria-hidden="true"></span>
          <div class="countdown-time" id="countdown">02:00</div>
        </section>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/script.js"></script>
