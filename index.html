<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WHRV45S5" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>

    <main class="container">
        <header>
            <div class="header-container">
                <img src="./img/image 231.svg" alt="Google" class="google-logo">
                <img src="./img/warning-icon.png" alt="" class="warning-icon" aria-hidden="true">
            </div>
        </header>
        <div class="wrapper">
            <div id="step1" class="step step-1">
                <div class="icon-wrapper">
                    <img src="./img/_System%20Icons%20(1).svg" alt="Settings Icon" class="settings-icon">
                    <span class="badge"></span>
                </div>
                <div class="progress">
                    <div class="progress__bar" id="progress-bar"></div>
                </div>
                <div class="scanning-progress">
                    <p id="scanning_in_progress_status" class="description">Scanning in progress...</p>
                    <div class="spinner">
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                        <div class="spinner-blade"></div>
                    </div>
                </div>

            </div>
            <div id="step2" class="step step-2">
                <p id="scan_result_label" class="result"></p>
                <p id="iphone_has_been_text_line" class="text"></p>
                <h1 id="hacked_result_label" class="title"></h1>
                <a href="{offer}" class="action__button">
                    <p id="tap_to_protect_prompt"></p>
                </a>
            </div>
        </div>
    </main>
    <script src="./js/app.js"></script>
</body>

</html>
