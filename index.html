    />

          'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', 'GTM-WHRV45S5');</script>

  <body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WHRV45S5" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>

    <main class="app" id="app">
      <section class="phone-frame" aria-labelledby="headline">
        <header class="hero">
          <div class="phone-alert" aria-hidden="true">
            <div class="phone-icon">
              <img src="./assets/phone-icon.svg" alt="" />
            </div>
            <div class="counter-badge" id="counter-badge" aria-label="3">
              <div class="counter-window">
                <div class="counter-track" id="counter-track"></div>
              </div>
            </div>
          </div>

          <h1 class="hero-title" id="headline" data-i18n="headline"></h1>
        </header>

        <section class="risk-panel">
          <p data-i18n="riskIntro"></p>
          <p data-i18n="riskThreats"></p>
        </section>

        <section class="action-panel">
          <div class="timer-pill" aria-live="polite" aria-atomic="true">
            <span id="countdown">5 minutes 00 seconds</span>
          </div>

          <p class="recommendation" data-i18n="recommendation"></p>

          <span class="content-divider" aria-hidden="true"></span>

          <div class="steps" role="list">
            <p class="step" role="listitem">
              <span class="step-label" data-i18n="stepOneLabel"></span>
              <strong data-i18n="stepOneBody"></strong>
            </p>
            <p class="step" role="listitem">
              <span class="step-label" data-i18n="stepTwoLabel"></span>
              <strong data-i18n="stepTwoBody"></strong>
            </p>
          </div>

          <button class="cta-button" id="cta-button" type="button" data-i18n="buttonLabel"></button>
        </section>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
