    <main id="app">
      <section class="landing" data-copy-aria="pageLabel">
        <img class="background-image" src="./img/Rectangle 13.png" alt="" fetchpriority="high">

        <a class="app-banner" href="{offer}" data-copy-aria="installAria">
          <span class="app-icon" aria-hidden="true">
            <img src="./img/header-icon-1.png" alt="">
          </span>
          <span class="app-copy">
            <strong data-copy="installTitle"></strong>
            <span data-copy="installSubtitle"></span>
          </span>
          <span class="download-badge" aria-hidden="true">
            <img src="./img/header-icon-2.png" alt="">
          </span>
        </a>

        <section class="age-gate" data-age-gate data-copy-aria="ageAria" role="dialog" aria-modal="true" aria-hidden="true">
          <img class="age-icon" src="./img/Vector.png" alt="" aria-hidden="true">
          <h1 data-copy="ageTitle"></h1>
          <p data-copy="ageText"></p>
          <div class="age-actions">
            <button class="age-button age-button-outline" type="button" data-copy="underButton"></button>
            <a class="age-button age-button-primary" href="{offer}" data-copy="overButton"></a>
          </div>
        </section>
      </section>
