<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-WHRV45S5');</script>

    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;

  </head>
  <body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WHRV45S5" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>

    <main id="app">
      <section class="reel" aria-label="Video chat preview">
        <video class="reel-video" autoplay muted loop playsinline preload="auto" poster="./img/photo-4.jpg">
          <source src="./video/reel-background.mp4" type="video/mp4">
        </video>
        <img class="video-fallback" src="./img/photo-4.jpg" alt="">

        <div class="shade shade-top"></div>
        <div class="shade shade-bottom"></div>

        <header class="reel-tabs" aria-label="Feed navigation">
          <span data-i18n="following">Following</span>
          <span class="divider"></span>
          <strong data-i18n="forYou">For You</strong>
        </header>

        <aside class="reel-actions" aria-label="Social actions">
          <a class="avatar-action" href="{offer}" aria-label="View profile">
            <img src="./img/profile-avatar.png" alt="">
            <span class="add-icon">+</span>
          </a>

          <a class="action-item" href="{offer}" aria-label="Likes">
            <img class="action-icon action-icon-heart" src="./img/icon-heart.svg" alt="">
            <strong>1.3M</strong>
          </a>

          <a class="action-item" href="{offer}" aria-label="Comments">
            <img class="action-icon action-icon-comment" src="./img/icon-comment.svg" alt="">
            <strong>10.7M</strong>
          </a>

          <a class="action-item" href="{offer}" aria-label="Share">
            <img class="action-icon action-icon-share" src="./img/icon-share.svg" alt="">
            <strong>30.9K</strong>
          </a>
        </aside>

        <div class="reel-copy">
          <h1>@JaneFisher</h1>
          <p data-i18n="caption">Locked in a house together .... TikTok time #fyp #quarantine</p>
          <p class="music"><span>♪</span> <span data-i18n="track">Cheryl - @Yung Gravy</span></p>
        </div>

        <footer class="cta-panel">
          <a class="cta" href="{offer}" data-i18n="cta">Start Free Video Chat</a>
          <div class="online">
            <span></span>
            <strong data-online-count>17,321</strong>
            <b data-i18n="online">Girls Online</b>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
